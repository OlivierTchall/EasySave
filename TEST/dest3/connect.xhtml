					if (!window.customElements || !HTMLElement.prototype.attachShadow || !window.requestIdleCallback) {

								// Fallback framework Web pour compat anciens navigateurs
                window.location.href = "login.xhtml" + window.location.search;

					}else{

					
			window.desk = null;
			Promise.all([
				"/@lib@/commons/registry.js",
				"/@lib@/commons/io/io.js",
				"/@back@/core/userSelfForms.js",
				"/@lib@/core/user.js",
				"/@back@/core/dialogs/login.js",
				"https://scenari.cesi.fr/~~static/chain/fr-FR/confAuth.js?202602181909",
			].map((src) =&gt; import(src))).then(async (modules) =&gt; {
				let reg = modules[0].REG.reg;
				let {IO} = modules[1];
				let {initLoginForm, initRenewPwdForm, initInitPwdForm} = modules[2];
				let {USER} = modules[3];
				await modules[5].init(reg);

				reg.installSkin("basis", document);
				reg.installSkin("form-control-areas", document);
				//reg.installSkin("webzone:panel", sr);
				reg.installSkin('c-login', document);

				reg.setPref("lang", 1, "fr-FR");



				let universe = reg.env.universe;
				let loginForm = document.getElementById("loginFormRoot");
				let renewPwdForm = document.getElementById("renewPwdFormRoot");
				let renewPwdEnd = document.getElementById("renewPwdEnd");

				// Inits UI
				let embeddedLoginFormContent = reg.getSvc('fullUserLoginMaker')(reg, loginForm);

				let renewPwdFormContent = reg.getSvc('userRenewPwdForm')(reg);
				renewPwdForm.appendChild(renewPwdFormContent);

				await universe.auth.fetchUser();

				function goto(section) {
					for (let p = section.previousElementSibling; p; p = p.previousElementSibling) p.hidden = true;
					for (let p = section.nextElementSibling; p; p = p.nextElementSibling) p.hidden = true;
					section.hidden = false;
					return section;
				}

				function gotoConnected() {
					const cause = searchParams.get("cause");
					const url = searchParams.get("r");
					if (cause!="403" &amp;&amp; IO.isRedirectValid(url, true)) location.href = url;
					else{
						if(searchParams.get("cid") === "true") window.parent.postMessage({"cidAuth": "succeeded"}, '*');
						const user = USER.getPrimaryName(universe.auth.currentUser);
						document.querySelector("#connected &gt; .userInfo").textContent = `Utilisateur &quot;${user}&quot; : vous êtes connecté·e`
						document.querySelector("#connected &gt; .actResp").textContent = (cause=="403" &amp;&amp; IO.isRedirectValid(url, true))
							? `Vos habilitations sont insuffisantes pour accéder à la page : ${url}`
							: "";
						document.getElementById("logout").onclick = () =&gt; {
							const svc = reg.getSvc("actionUserLogout");
							if(svc &amp;&amp; svc.isVisible(this))
								svc.execute(this).then(()=&gt;gotoLogin())
							else
								gotoLogin()
						};
						goto(document.getElementById("connected"));
					}
				}

				function gotoLogin() {
					goto(loginForm);
					let url = searchParams.get("r");
					if(url)
						loginForm.querySelector(".userInfo").textContent = "L&apos;accès à la ressource demandée nécessite une authentification";

					if(embeddedLoginFormContent)
						initLoginForm(embeddedLoginFormContent, universe.userSelf, universe.auth, {
							showRenewPwd: () =&gt; goto(renewPwdForm).querySelector('form'),
							hideRenewPwd: () =&gt; goto(loginForm).querySelector('form'),
						});
				}

				universe.auth.listeners.on('loggedUserChanged', (oldUser, newUser) =&gt; {
					if (!newUser) return;
					gotoConnected();
				});

				let searchParams = new URLSearchParams(location.search);

				if (searchParams.has("renew")) {
					goto(renewPwdForm);
					const user = USER.getPrimaryName(universe.auth.currentUser);
					renewPwdForm.querySelector(".userInfo").textContent = `Utilisateur &quot;${user}"`;
					initRenewPwdForm(renewPwdFormContent, universe.userSelf, universe.auth, {
						renewPwdDone: () =&gt; goto(loginForm).querySelector('form')
					});
				} else if (searchParams.has("updateToken")) {
					let initPwdForm = document.getElementById("initPwdForm");
					goto(initPwdForm);
					initInitPwdForm(initPwdForm, universe.userSelf, universe.auth, {
						updateToken: searchParams.get("updateToken"),
						account: searchParams.get("account"),
						initPwdDone: () =&gt; goto(renewPwdEnd).querySelector('form')
					});
				} else if (universe.auth.currentAccount) {
					gotoConnected(true);
				} else {
					gotoLogin();
				}
			});
        }</script><section id="loginFormRoot" hidden=""><h3>CESIEI - Authentification</h3><p class="message userInfo"/></section><section id="renewPwdFormRoot" hidden=""><h3>CESIEI</h3></section><form id="initPwdForm" hidden="" method="post"><section><h3>CESIEI - Initialisation de votre mot de passe</h3><p class="message" hidden=""/><p class="error actResp" hidden=""/><section class="fields"><label for="initAccount">Compte</label><input name="account" id="initAccount"/><label for="initPwd">Nouveau mot de passe</label><input name="newPwd" type="password" id="initPwd" autocomplete="new-password"/><label for="initConfirmPwd">Confirmation du mot de passe</label><input name="confirmPwd" type="password" id="initConfirmPwd"/></section><div class="footer" id="initPwdActions"><button type="submit">Valider</button></div></section></form><section id="connected" hidden=""><h3>CESIEI</h3><p class="message userInfo"/><p class="actResp"/><div class="footer" id="connectedActions"><button id="logout" type="submit">Se déconnecter</button></div></section><section id="renewPwdEnd" hidden=""><h3>CESIEI - Renouvellement de votre mot de passe</h3><p class="message userInfo"/><p class="actResp">Votre mot de passe a bien été initialisé, merci de vous authentifier avec ce dernier</p></section></body></html>
